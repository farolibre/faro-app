<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARO - Ritmo (Nueva versión)</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1A1A1A;
            --bg-step: #0D0D0D;
            --primary: #E6C200;
            --primary-light: #FFD700;
            --text-main: #FFFFFF;
            --text-muted: #CCCCCC;
            --text-dim: #808080;
            --border: #2A2A2A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #111111 100%);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 520px;
            width: 100%;
        }

        /* Selector */
        .selector {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
            background: rgba(30, 30, 30, 0.6);
            padding: 0.8rem;
            border-radius: 50px;
            max-height: 140px;
            overflow-y: auto;
        }

        .btn-conducta {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .btn-conducta:hover, .btn-conducta:focus {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-conducta.activa {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(230, 194, 0, 0.12);
            box-shadow: 0 0 8px rgba(230, 194, 0, 0.2);
        }

        .btn-conducta:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Tarjetas */
        .ritmo-card {
            background: linear-gradient(145deg, var(--bg-card) 0%, #151515 100%);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(230, 194, 0, 0.2);
            margin-bottom: 1.5rem;
        }

        .conducta {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .racha {
            color: #E69500;
            font-size: 0.85rem;
            background: rgba(230, 149, 0, 0.15);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            margin-bottom: 1.2rem;
            font-weight: 500;
        }

        .paso-card {
            background: var(--bg-step);
            border-radius: 28px;
            padding: 2rem;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(230, 194, 0, 0.15);
            margin-top: 0.5rem;
        }

        .paso-contador {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .paso-texto {
            color: var(--text-main);
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .frase-animo {
            color: var(--primary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            font-style: italic;
            opacity: 0.9;
        }

        .mensaje-motivacion {
            color: var(--primary);
            background: rgba(230, 194, 0, 0.1);
            padding: 1rem;
            border-radius: 16px;
            margin-top: 0.8rem;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Botones */
        button {
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            border: none;
            color: #111;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 40px;
            transition: all 0.2s ease;
            margin-top: 0.6rem;
        }

        button:hover { transform: translateY(-1px) scale(0.98); }
        button:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

        .btn-secundario {
            background: transparent;
            border: 1px solid #555;
            color: var(--text-muted);
        }
        .btn-secundario:hover { border-color: var(--primary); color: var(--primary); }

        .btn-atras {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: auto;
            padding: 0.6rem 1.4rem;
            margin-top: 1.5rem;
        }
        .btn-atras:hover { color: var(--primary); border-color: var(--primary); }

        /* Animaciones */
        .check-flotante {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            animation: floatCheck 0.6s ease forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes floatCheck {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1); }
        }

        .estrellas {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            animation: estrellasBrillan 0.8s ease forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes estrellasBrillan {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); text-shadow: 0 0 30px gold; }
            100% { opacity: 0; transform: scale(1); }
        }

        /* Accesibilidad: movimiento reducido */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .check-flotante, .estrellas { display: none; }
        }

        /* Scroll suave para selector */
        .selector::-webkit-scrollbar { width: 6px; }
        .selector::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>

<body>

        const frasesAnimo = ["🌈 ¡Primer paso!", "💪 Sigue así", "🌟 Cada paso cuenta", "🔥 Más cerca", "🌱 Pequeños pasos", "💫 No pares", "⭐ Importante", "🎯 Buen camino", "💚 Se nota", "✨ Último empujón!"];
        const mensajesMotivacion = ["🎉 Día completado! ⭐", "🌟 Lo lograste! 🔥", "💪 Más fuerte!", "🌱 Un día más", "🔥 Racha increíble", "⭐ Brillando", "💫 Misión cumplida", "🌈 Sigues pintando"];

        // ==========================================
        // ESTADO Y UTILIDADES
        // ==========================================
        let conductaActualId = "comer";
        let pacto = null;

        function getFechaHoy() {
            const hoy = new Date();
            return `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
        }

        function obtenerEstadoCompletado() {
            try {
                const estado = localStorage.getItem(STORAGE_KEYS.ESTADO_CONDUCTAS);
                return estado ? JSON.parse(estado) : {};
            } catch (e) {
                console.error('Error al leer estado:', e);
                return {};
            }
        }

        function guardarEstadoCompletado(estado) {
            try {
                localStorage.setItem(STORAGE_KEYS.ESTADO_CONDUCTAS, JSON.stringify(estado));
            } catch (e) { console.error('Error al guardar estado:', e); }
        }

        function estaCompletadoHoy(conductaId) {
            const hoy = getFechaHoy();
            const estado = obtenerEstadoCompletado();
            return estado[conductaId] === hoy;
        }

        function marcarCompletadoHoy(conductaId) {
            const hoy = getFechaHoy();
            const estado = obtenerEstadoCompletado();
            estado[conductaId] = hoy;
            guardarEstadoCompletado(estado);
        }

        function obtenerProgresoPaso(conductaId, fecha) {
            const key = STORAGE_KEYS.PROGRESO(conductaId, fecha);
            const progreso = localStorage.getItem(key);
            if (!progreso) return 0;
            const num = parseInt(progreso, 10);
            return isNaN(num) ? 0 : num;
        }

        function guardarProgresoPaso(conductaId, fecha, pasoActual) {
            localStorage.setItem(STORAGE_KEYS.PROGRESO(conductaId, fecha), pasoActual);
        }

        function eliminarProgreso(conductaId, fecha) {
            localStorage.removeItem(STORAGE_KEYS.PROGRESO(conductaId, fecha));
        }

      function cargarPacto() {
    try {
        const dato = localStorage.getItem(STORAGE_KEYS.PACTO);
        pacto = dato ? JSON.parse(dato) : null;
    } catch (e) {
        console.error('Error al cargar pacto:', e);
        pacto = null;
    }

    // Si no hay pacto o está vacío, inicializar con las primeras 3
    if (!pacto || !Array.isArray(pacto.conductasActivas) || pacto.conductasActivas.length === 0) {
        pacto = {
            conductasActivas: conductasDisponibles.slice(0, 3).map(c => ({
                ...c,
                fechaInicio: new Date().toISOString()
            }))
        };
    } else {
        // ✅ NUEVO: Fusionar conductas nuevas con las ya guardadas
        const idsActivas = new Set(pacto.conductasActivas.map(c => c.id));
        conductasDisponibles.forEach(c => {
            if (!idsActivas.has(c.id)) {
                pacto.conductasActivas.push({ 
                    ...c, 
                    fechaInicio: new Date().toISOString() 
                });
            }
        });
    }

    // Guardar el pacto actualizado
    try {
        localStorage.setItem(STORAGE_KEYS.PACTO, JSON.stringify(pacto));
    } catch (e) {
        console.error('Error al guardar pacto:', e);
    }
}

            if (!pacto || !Array.isArray(pacto.conductasActivas) || pacto.conductasActivas.length === 0) {
                pacto = {
                    conductasActivas: [
                        { id: "comer", nombre: "Comer", emoji: "🍽️", fechaInicio: new Date().toISOString() },
                        { id: "dormir", nombre: "Dormir", emoji: "😴", fechaInicio: new Date().toISOString() },
                        { id: "meditacion", nombre: "Meditación", emoji: "🧘", fechaInicio: new Date().toISOString() }
                    ]
                };
                try { localStorage.setItem(STORAGE_KEYS.PACTO, JSON.stringify(pacto)); } 
                catch (e) { console.error('Error al inicializar pacto:', e); }
            }
        }

        function getConductaActual() {
            return pacto.conductasActivas.find(c => c.id === conductaActualId) || pacto.conductasActivas[0];
        }

        function calcularRacha(conductaId) {
            const estado = obtenerEstadoCompletado();
            const hoy = getFechaHoy();
            const ultimo = estado[conductaId];
            
            if (!ultimo) return '🌱 Hoy es día de retomar';
            if (ultimo === hoy) return '🔥 Racha activa: Completado hoy';
            
            // Cálculo básico de días consecutivos hacia atrás
            let dias = 0;
            let fecha = new Date();
            fecha.setDate(fecha.getDate() - 1);
            
            while (true) {
                const fStr = `${fecha.getFullYear()}-${String(fecha.getMonth() + 1).padStart(2, '0')}-${String(fecha.getDate()).padStart(2, '0')}`;
                if (estado[conductaId] === fStr) {
                    dias++;
                    fecha.setDate(fecha.getDate() - 1);
                } else {
                    break;
                }
            }
            return dias > 0 ? `🔥 Racha: ${dias} día${dias > 1 ? 's' : ''} antes de hoy` : '🌱 Reinicia tu ritmo hoy';
        }

        // ==========================================
        // RENDERIZADO
        // ==========================================
        function renderizarSelector() {
            const selectorDiv = document.getElementById('selector');
            selectorDiv.innerHTML = '';

            pacto.conductasActivas.forEach(conducta => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = `${conducta.emoji} ${conducta.nombre}`;
                btn.className = `btn-conducta ${conducta.id === conductaActualId ? 'activa' : ''}`;
                btn.setAttribute('role', 'tab');
                btn.setAttribute('aria-selected', conducta.id === conductaActualId);
                btn.onclick = () => {
                    conductaActualId = conducta.id;
                    renderizarTodo();
                };
                selectorDiv.appendChild(btn);
            });

            const btnAgregar = document.createElement('button');
            btnAgregar.type = 'button';
            btnAgregar.textContent = '+ Agregar';
            btnAgregar.className = 'btn-conducta';
            btnAgregar.onclick = () => window.location.href = 'seleccion.html';
            selectorDiv.appendChild(btnAgregar);
        }

        function showCheckAnimation() {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            const d = document.createElement('div');
            d.className = 'check-flotante';
            d.innerHTML = '✅';
            d.setAttribute('aria-hidden', 'true');
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 600);
        }

        function showStarsAnimation() {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            const d = document.createElement('div');
            d.className = 'estrellas';
            d.innerHTML = '⭐✨🌟';
            d.setAttribute('aria-hidden', 'true');
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 800);
        }

        function actualizarPasos() {
            const container = document.getElementById('pasoContainer');
            const conducta = getConductaActual();
            const completadoHoy = estaCompletadoHoy(conducta.id);
            const hoy = getFechaHoy();

            if (completadoHoy) {
                container.innerHTML = `
                    <div class="paso-card">
                        <div style="color: var(--primary); font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem;">
                            ✨ ¡COMPLETADO HOY!
                        </div>
                        <div class="mensaje-motivacion">
                            🏆 ${mensajesMotivacion[Math.floor(Math.random() * mensajesMotivacion.length)]}
                        </div>
                    </div>
                `;
                return;
            }

            const progresoActual = obtenerProgresoPaso(conducta.id, hoy);
            const pasos = pasosPorConducta[conducta.id] || pasosPorConducta.comer;

            if (progresoActual >= pasos.length) {
                container.innerHTML = `
                    <div class="paso-card">
                        <div class="paso-texto">🎯 ¡RITMO COMPLETADO!</div>
                        <button id="btnCompletarDia" type="button" aria-label="Completar día para ${conducta.nombre}">✅ COMPLETAR HOY</button>
                    </div>
                `;
                document.getElementById('btnCompletarDia').onclick = () => {
                    marcarCompletadoHoy(conducta.id);
                    eliminarProgreso(conducta.id, hoy);
                    showStarsAnimation();
                    alert(`🌟 ¡Día completado para ${conducta.nombre}!`);
                    renderizarTodo();
                };
            } else {
                container.innerHTML = `
                    <div class="paso-card">
                        <div class="paso-contador">🔥 PASO ${progresoActual + 1} DE ${pasos.length}</div>
                        <div class="paso-texto">${pasos[progresoActual]}</div>
                        <div class="frase-animo">✨ ${frasesAnimo[progresoActual % frasesAnimo.length]}</div>
                        <button id="btnSiguientePaso" type="button" aria-label="Completar paso actual">✅ COMPLETAR PASO</button>
                        <button id="btnSaltarDia" class="btn-secundario" type="button" aria-label="Saltar el día de hoy">⏸️ SALTAR HOY</button>
                    </div>
                `;
                document.getElementById('btnSiguientePaso').onclick = () => {
                    guardarProgresoPaso(conducta.id, hoy, progresoActual + 1);
                    showCheckAnimation();
                    actualizarPasos();
                };
                document.getElementById('btnSaltarDia').onclick = () => {
                    if (confirm('¿Saltar hoy? Perderás el progreso de hoy y empezarás de cero mañana.')) {
                        eliminarProgreso(conducta.id, hoy);
                        renderizarTodo();
                    }
                };
            }
        }

        function renderizarTodo() {
            const conducta = getConductaActual();
            document.getElementById('conductaTexto').textContent = `${conducta.emoji} ${conducta.nombre}`;
            document.getElementById('racha').textContent = calcularRacha(conducta.id);
            actualizarPasos();
        }

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        function init() {
            cargarPacto();
            renderizarSelector();
            renderizarTodo();

            document.getElementById('btnVolver').onclick = () => {
                window.location.href = 'pacto.html';
            };
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
