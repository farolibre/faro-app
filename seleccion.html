<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARO - Elegir conducta</title>
    <style>
        :root { --bg: #0a0a0a; --card: #1A1A1A; --primary: #E6C200; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: system-ui; margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; text-align: center; }
        p { color: #888; margin-bottom: 2rem; text-align: center; max-width: 400px; line-height: 1.5; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; width: 100%; max-width: 600px; margin-bottom: 2rem; }
        .item { background: var(--card); border: 2px solid #333; border-radius: 16px; padding: 1rem; cursor: pointer; text-align: center; transition: all 0.2s; }
        .item:hover { border-color: #555; }
        .item.seleccionado { border-color: var(--primary); background: rgba(230, 194, 0, 0.1); }
        .item .emoji { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
        .item .nombre { font-size: 0.9rem; font-weight: 500; }
        .btn-continuar { background: var(--primary); color: #000; border: none; padding: 1rem 2rem; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; max-width: 300px; opacity: 0.5; pointer-events: none; transition: all 0.3s; }
        .btn-continuar.activo { opacity: 1; pointer-events: auto; }
        .btn-volver { background: transparent; color: #666; border: none; margin-top: 1rem; cursor: pointer; text-decoration: underline; }
        .info { background: rgba(230, 194, 0, 0.05); padding: 1rem; border-radius: 12px; margin-bottom: 2rem; max-width: 500px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <h1>🌱 ¿Qué quieres regular?</h1>
    <p>Elige las conductas que te gustaría acompañar en tu día a día. Puedes cambiarlas cuando lo necesites.</p>
    
    <div class="info">
        💛 <strong>Sin presión:</strong> No hay metas rígidas. Solo pequeños pasos hacia tu bienestar.
    </div>
    
    <div class="grid" id="gridConductas"></div>
    
    <button class="btn-continuar" id="btnContinuar">COMENZAR MI RITMO →</button>
    <button class="btn-volver" onclick="window.location.href='index.html'">← Volver al inicio</button>

    <script>
        const TODAS_CONDUCTAS = [
            { id: "comer", nombre: "Comer", emoji: "🍽️" }, { id: "dormir", nombre: "Dormir", emoji: "😴" },
            { id: "higiene", nombre: "Higiene", emoji: "🚿" }, { id: "salir", nombre: "Salir", emoji: "🚪" },
            { id: "movimiento", nombre: "Movimiento", emoji: "💪" }, { id: "contacto", nombre: "Contacto social", emoji: "💬" },
            { id: "consumo", nombre: "Consumo", emoji: "🍷" }, { id: "pantallas", nombre: "Pantallas", emoji: "📱" },
            { id: "compras", nombre: "Compras", emoji: "🛍️" }, { id: "higieneExtrema", nombre: "Higiene extrema", emoji: "🧼" },
            { id: "meditacion", nombre: "Meditación", emoji: "🧘" }, { id: "lectura", nombre: "Lectura", emoji: "📚" },
            { id: "gratitud", nombre: "Gratitud", emoji: "🙏" }, { id: "orden", nombre: "Orden", emoji: "🧹" },
            { id: "creatividad", nombre: "Creatividad", emoji: "🎨" }, { id: "naturaleza", nombre: "Naturaleza", emoji: "🌿" },
            { id: "limites", nombre: "Límites", emoji: "🚧" }, { id: "autocuidado", nombre: "Autocuidado", emoji: "💆" },
            { id: "aprendizaje", nombre: "Aprendizaje", emoji: "🎓" }, { id: "silencio", nombre: "Silencio digital", emoji: "🔇" }
        ];

        let seleccionadas = new Set();

        function renderizar() {
            const grid = document.getElementById('gridConductas');
            grid.innerHTML = '';
            
            try {
                const pacto = JSON.parse(localStorage.getItem('faro_pacto_nuevo'));
                if(pacto && pacto.conductasActivas) {
                    pacto.conductasActivas.forEach(c => seleccionadas.add(c.id));
                }
            } catch(e) {}

            TODAS_CONDUCTAS.forEach(c => {
                const div = document.createElement('div');
                div.className = `item ${seleccionadas.has(c.id) ? 'seleccionado' : ''}`;
                div.innerHTML = `<span class="emoji">${c.emoji}</span><span class="nombre">${c.nombre}</span>`;
                div.onclick = () => {
                    if(seleccionadas.has(c.id)) seleccionadas.delete(c.id);
                    else seleccionadas.add(c.id);
                    renderizar();
                    actualizarBoton();
                };
                grid.appendChild(div);
            });
        }

        function actualizarBoton() {
            const btn = document.getElementById('btnContinuar');
            if(seleccionadas.size > 0) btn.classList.add('activo');
            else btn.classList.remove('activo');
        }

        document.getElementById('btnContinuar').onclick = () => {
            if(seleccionadas.size === 0) return;
            
            const pacto = {
                conductasActivas: TODAS_CONDUCTAS.filter(c => seleccionadas.has(c.id))
                    .map(c => ({...c, fechaInicio: new Date().toISOString()}))
            };
            
            localStorage.setItem('faro_pacto_nuevo', JSON.stringify(pacto));
            window.location.href = 'ritmo.html';
        };

        renderizar();
        actualizarBoton();
    </script>
</body>
</html>
