<!DOCTYPE html>
<html>
<head>
    <title>FARO - Comunidad</title>
    <style>
        body {
            background-color: #111111;
            font-family: system-ui, monospace;
            margin: 0;
            padding: 1rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #E6C200;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .subtitulo {
            color: #808080;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .escribir {
            background-color: #1A1A1A;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #2A2A2A;
        }
        textarea {
            width: 100%;
            background-color: #111111;
            border: 1px solid #2A2A2A;
            color: #CCCCCC;
            padding: 0.6rem;
            box-sizing: border-box;
            margin-bottom: 0.5rem;
            font-family: inherit;
        }
        .btn-publicar {
            background: transparent;
            border: 1px solid #E6C200;
            color: #E6C200;
            padding: 0.5rem;
            cursor: pointer;
            width: 100%;
        }
        .btn-publicar:hover {
            background-color: #E6C200;
            color: #111111;
        }
        
        /* Mensajes */
        .mensaje {
            background-color: #1A1A1A;
            border: 1px solid #2A2A2A;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            transition: all 0.3s ease;
        }
        .mensaje-premiado {
            border: 2px solid #E6C200;
            background-color: rgba(230, 194, 0, 0.1);
            box-shadow: 0 0 10px rgba(230, 194, 0, 0.3);
        }
        .mensaje-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .autor {
            color: #E6C200;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .fecha {
            color: #808080;
            font-size: 0.6rem;
        }
        .texto {
            color: #CCCCCC;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 0.6rem;
        }
        .corazones {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-corazon {
            background: transparent;
            border: 1px solid #2A2A2A;
            color: #808080;
            padding: 0.2rem 0.5rem;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 20px;
            width: auto;
        }
        .btn-corazon:hover {
            border-color: #E6C200;
        }
        .btn-corazon.activo {
            border-color: #E6C200;
            color: #E6C200;
        }
        .contador-corazones {
            color: #E6C200;
            font-size: 0.8rem;
        }
        .premio-badge {
            background-color: #E6C200;
            color: #111111;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.65rem;
            margin-left: 0.5rem;
        }
        .vacio {
            text-align: center;
            color: #808080;
            padding: 2rem;
        }
        .btn-volver {
            background: transparent;
            border: 1px solid #808080;
            color: #808080;
            padding: 0.5rem;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-volver:hover {
            background-color: #808080;
            color: #111111;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 0.5rem;
        }
        .stat {
            background-color: #1A1A1A;
            padding: 0.5rem;
            text-align: center;
            flex: 1;
            border: 1px solid #2A2A2A;
        }
        .stat-valor {
            color: #E6C200;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .stat-label {
            color: #808080;
            font-size: 0.65rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌱 Comunidad de apoyo</h1>
    <div class="subtitulo">💬 Comparte tu experiencia | ❤️ Apoya a otros con un corazón</div>
    
    <div class="stats" id="stats"></div>
    
    <div class="escribir">
        <textarea id="mensaje" rows="2" placeholder="Comparte algo con la comunidad..."></textarea>
        <button class="btn-publicar" id="btnPublicar">📨 PUBLICAR MENSAJE</button>
    </div>
    
    <div id="mensajes"></div>
    
    <button id="btnVolver" class="btn-volver">← VOLVER AL RITMO</button>
</div>

<script>
    // Cargar mensajes
    let mensajes = JSON.parse(localStorage.getItem('comunidad_mensajes_corazones')) || [];
    
    // Identidad del introexplorador actual (para saber si ya dio corazón)
    let miId = localStorage.getItem('faro_intro_id');
    if (!miId) {
        miId = 'intro_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('faro_intro_id', miId);
    }
    
    // Actualizar estadísticas
    function actualizarStats() {
        const totalMensajes = mensajes.length;
        const totalCorazones = mensajes.reduce((sum, m) => sum + (m.corazones || 0), 0);
        const mensajesPremiados = mensajes.filter(m => (m.corazones || 0) >= 3).length;
        
        document.getElementById('stats').innerHTML = `
            <div class="stat">
                <div class="stat-valor">${totalMensajes}</div>
                <div class="stat-label">mensajes</div>
            </div>
            <div class="stat">
                <div class="stat-valor">❤️ ${totalCorazones}</div>
                <div class="stat-label">corazones dados</div>
            </div>
            <div class="stat">
                <div class="stat-valor">🏆 ${mensajesPremiados}</div>
                <div class="stat-label">premiados</div>
            </div>
        `;
    }
    
    // Dar/Quitar corazón
    function darCorazon(mensajeId) {
        const mensaje = mensajes.find(m => m.id === mensajeId);
        if (!mensaje) return;
        
        if (!mensaje.corazonesUsuarios) mensaje.corazonesUsuarios = [];
        
        if (mensaje.corazonesUsuarios.includes(miId)) {
            // Quitar corazón
            mensaje.corazonesUsuarios = mensaje.corazonesUsuarios.filter(id => id !== miId);
            mensaje.corazones = (mensaje.corazones || 0) - 1;
        } else {
            // Dar corazón
            mensaje.corazonesUsuarios.push(miId);
            mensaje.corazones = (mensaje.corazones || 0) + 1;
        }
        
        localStorage.setItem('comunidad_mensajes_corazones', JSON.stringify(mensajes));
        mostrarMensajes();
    }
    
    // Escapar HTML
    function escapeHtml(texto) {
        return texto.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Mostrar mensajes
    function mostrarMensajes() {
        const container = document.getElementById('mensajes');
        
        if (mensajes.length === 0) {
            container.innerHTML = '<div class="vacio">🌱 No hay mensajes aún. ¡Sé el primero en compartir algo!</div>';
            actualizarStats();
            return;
        }
        
        // Ordenar: primeros los premiados (3+ corazones), luego por fecha
        const ordenados = [...mensajes].sort((a, b) => {
            const aPremiado = (a.corazones || 0) >= 3;
            const bPremiado = (b.corazones || 0) >= 3;
            if (aPremiado && !bPremiado) return -1;
            if (!aPremiado && bPremiado) return 1;
            return b.id - a.id;
        });
        
        let html = '';
        for (const m of ordenados) {
            const corazones = m.corazones || 0;
            const esPremiado = corazones >= 3;
            const yaDioCorazon = m.corazonesUsuarios && m.corazonesUsuarios.includes(miId);
            
            let premioBadge = '';
            if (esPremiado) {
                premioBadge = '<span class="premio-badge">🏆 MENSAJE DESTACADO</span>';
            }
            
            let mensajeClass = 'mensaje';
            if (esPremiado) mensajeClass += ' mensaje-premiado';
            
            let corazonesHtml = '';
            if (corazones > 0) {
                corazonesHtml = `<span class="contador-corazones">❤️ ${corazones}</span>`;
            }
            
            html += `
                <div class="${mensajeClass}">
                    <div class="mensaje-header">
                        <div class="autor">
                            ${m.autor || 'Introexplorador'} ${premioBadge}
                        </div>
                        <div class="fecha">${m.fecha}</div>
                    </div>
                    <div class="texto">${escapeHtml(m.texto)}</div>
                    <div class="corazones">
                        <button class="btn-corazon ${yaDioCorazon ? 'activo' : ''}" data-id="${m.id}">
                            ${yaDioCorazon ? '❤️' : '🤍'} Apoyar
                        </button>
                        ${corazonesHtml}
                    </div>
                </div>
            `;
        }
        
        container.innerHTML = html;
        
        // Añadir eventos a los botones de corazón
        document.querySelectorAll('.btn-corazon').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                darCorazon(id);
            });
        });
        
        actualizarStats();
    }
    
    // Publicar mensaje
    document.getElementById('btnPublicar').onclick = () => {
        const texto = document.getElementById('mensaje').value.trim();
        if (!texto) {
            alert('Escribe algo antes de publicar.');
            return;
        }
        
        // Obtener la conducta principal del introexplorador (para personalizar)
        let emoji = '🌱';
        const pacto = localStorage.getItem('faro_pacto');
        if (pacto) {
            try {
                const pactoObj = JSON.parse(pacto);
                if (pactoObj.conductasActivas && pactoObj.conductasActivas.length > 0) {
                    emoji = pactoObj.conductasActivas[0].emoji;
                }
            } catch(e) {}
        }
        
        const nuevoMensaje = {
            id: Date.now(),
            autor: `${emoji} Introexplorador`,
            texto: texto,
            fecha: new Date().toLocaleString(),
            corazones: 0,
            corazonesUsuarios: []
        };
        
        mensajes.unshift(nuevoMensaje);
        if (mensajes.length > 100) mensajes = mensajes.slice(0, 100);
        localStorage.setItem('comunidad_mensajes_corazones', JSON.stringify(mensajes));
        
        document.getElementById('mensaje').value = '';
        mostrarMensajes();
        
        // Mensaje de agradecimiento
        alert('💚 ¡Gracias por compartir! Tu mensaje ayuda a otros introexploradores.');
    };
    
    mostrarMensajes();
    
    document.getElementById('btnVolver').onclick = () => {
        window.location.href = 'ritmo.html';
    };
</script>
</body>
</html>
